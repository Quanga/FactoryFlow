services:

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aece_checkpoint
      POSTGRES_USER: aece
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aece -d aece_checkpoint"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── AECE Checkpoint app ──────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://aece:${DB_PASSWORD:-changeme}@postgres:5432/aece_checkpoint
      # Optional — for password reset emails (Postmark)
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      # Optional — base URL used in email links (e.g. https://aece.yourdomain.com)
      APP_URL: ${APP_URL:-http://localhost:5000}
    env_file:
      - .env

volumes:
  postgres_data:
